site_name: pgcarter
site_description: >-
  PostgreSQL schema inventory, SQL extraction, documentation generation, and
  database shape analysis — read-only, never dumps table data.
site_author: pgcarter contributors
repo_url: https://github.com/blu3pr1n7/pgcarter
repo_name: blu3pr1n7/pgcarter
edit_uri: edit/master/docs/
copyright: Copyright &copy; pgcarter contributors

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

# Make broken links / anchors / omitted nav files fail `mkdocs build --strict`.
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore
    unrecognized_links: warn

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home:
      - Overview: index.md
  - Getting Started:
      - Installation: installation.md
      - Usage: usage.md
      - Configuration: configuration.md
  - CLI:
      - Commands: cli.md
  - Architecture:
      - Design: architecture.md
  - Development:
      - Development Setup: development.md
      - Contributing: contributing.md
  - Reference:
      - API: reference.md
