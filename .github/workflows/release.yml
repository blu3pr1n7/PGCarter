name: Release

# Publish to PyPI when a version tag is pushed (e.g. v0.1.0). The build is
# re-run and metadata re-verified here so a release never ships an artifact that
# CI did not validate.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist & wheel
        run: python -m build
      - name: Verify distribution metadata
        run: twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Never attempt to publish from a fork.
    if: github.repository == 'blu3pr1n7/pgcarter'
    environment:
      name: pypi
      url: https://pypi.org/p/pgcarter
    permissions:
      # OIDC token for PyPI Trusted Publishing — no API token secret required.
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
