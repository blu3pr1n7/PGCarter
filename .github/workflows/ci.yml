name: CI

# Fast, parallel validation for every push to master and every pull request.
# Jobs are independent so failures are isolated and easy to diagnose, and a
# contributor sees lint/type/unit results without waiting on the slower
# PostgreSQL integration job.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on a branch/PR; never cancel a master run mid-flight.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint, format & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check --output-format=github pgcarter tests
      - name: Ruff format check
        run: ruff format --check pgcarter tests
      - name: Type check (mypy)
        run: mypy pgcarter

  unit:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (the project's requires-python) plus the latest stable release.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: pytest -m "not integration" --cov=pgcarter --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  integration:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    # A disposable, per-run PostgreSQL. Each CI run gets a fresh database, so
    # integration tests are isolated and deterministic with no manual setup.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgcarter
          POSTGRES_PASSWORD: pgcarter
          POSTGRES_DB: pgcarter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgcarter -d pgcarter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGCARTER_TEST_HOST: localhost
      PGCARTER_TEST_PORT: "5432"
      PGCARTER_TEST_DB: pgcarter_test
      PGCARTER_TEST_USER: pgcarter
      PGCARTER_TEST_PASSWORD: pgcarter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Seed test schema
        run: >-
          psql "postgresql://pgcarter:pgcarter@localhost:5432/pgcarter_test"
          -v ON_ERROR_STOP=1 -f tests/fixtures/seed.sql
      - name: Run integration tests
        run: pytest -m integration

  build:
    name: Build & verify package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist & wheel
        run: python -m build
      - name: Verify distribution metadata
        run: twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
